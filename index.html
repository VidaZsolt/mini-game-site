<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Mini Game Hub</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

button {
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
}

.game {
    display: none;
    margin-top: 20px;
}

.active {
    display: block;
}

.box {
    font-size: 30px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎮 Mini Game Hub</h1>

<!-- MENÜ -->
<button onclick="showGame('menu')">🏠 Menü</button>
<button onclick="showGame('guess')">🎯 Guess Game</button>
<button onclick="showGame('click')">👆 Click Game</button>
<button onclick="showGame('rps')">✊ Rock Paper Scissors</button>

<hr>

<!-- MENÜ -->
<div id="menu" class="game active">
    <h2>Válassz játékot 👆</h2>
</div>

<!-- GUESS GAME -->
<div id="guess" class="game">
    <h2>🎯 Guess the Number (1-10)</h2>
    <input id="guessInput" type="number">
    <button onclick="checkGuess()">Tippelés</button>
    <p id="guessResult"></p>
</div>

<!-- CLICK GAME -->
<div id="click" class="game">
    <h2>👆 Click Game</h2>
    <button onclick="addScore()">Kattints!</button>
    <div class="box">Pont: <span id="score">0</span></div>
</div>

<!-- RPS -->
<div id="rps" class="game">
    <h2>✊ Rock Paper Scissors</h2>
    <button onclick="rps('rock')">✊ Kő</button>
    <button onclick="rps('paper')">✋ Papír</button>
    <button onclick="rps('scissors')">✌️ Olló</button>
    <p id="rpsResult"></p>
</div>

<script>
let score = 0;
let randomNumber = Math.floor(Math.random() * 10) + 1;

function showGame(id) {
    document.querySelectorAll('.game').forEach(g => g.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// GUESS GAME
function checkGuess() {
    let guess = document.getElementById("guessInput").value;
    if (guess == randomNumber) {
        document.getElementById("guessResult").innerText = "🎉 Talált!";
        randomNumber = Math.floor(Math.random() * 10) + 1;
    } else {
        document.getElementById("guessResult").innerText = "❌ Nem jó, próbáld újra!";
    }
}

// CLICK GAME
function addScore() {
    score++;
    document.getElementById("score").innerText = score;
}

// RPS
function rps(player) {
    let choices = ["rock", "paper", "scissors"];
    let cpu = choices[Math.floor(Math.random() * 3)];

    if (player === cpu) {
        document.getElementById("rpsResult").innerText = "Döntetlen 🤝";
    } else if (
        (player === "rock" && cpu === "scissors") ||
        (player === "paper" && cpu === "rock") ||
        (player === "scissors" && cpu === "paper")
    ) {
        document.getElementById("rpsResult").innerText = "Nyertél 🎉 CPU: " + cpu;
    } else {
        document.getElementById("rpsResult").innerText = "Vesztettél 😅 CPU: " + cpu;
    }
}
</script>

</body>
</html>
