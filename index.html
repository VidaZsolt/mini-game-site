<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Game Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: #111a2e;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1b2a4a;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
    background: #243a66;
}

/* BUTTON */
button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #38bdf8;
    font-weight: bold;
    margin-top: 10px;
}

button:hover {
    background: #0ea5e9;
}

/* GAME SCREEN */
.game {
    display: none;
    padding: 20px;
    text-align: center;
}

.active {
    display: block;
}

.back {
    background: #ef4444;
}
</style>
</head>

<body>

<header>
<h1>🎮 Game Store</h1>
<p>Válassz egy játékot és induljon 🚀</p>
</header>

<!-- STORE -->
<div id="store" class="container">

<div class="card">
<h3>🎯 Guess Game</h3>
<p>Találd ki a számot!</p>
<button onclick="openGame('guess')">Play</button>
</div>

<div class="card">
<h3>👆 Click Game</h3>
<p>Kattints minél többet!</p>
<button onclick="openGame('click')">Play</button>
</div>

<div class="card">
<h3>✊ RPS</h3>
<p>Kő-Papír-Olló</p>
<button onclick="openGame('rps')">Play</button>
</div>

<div class="card">
<h3>➗ Math Game</h3>
<p>Gyors matek feladatok</p>
<button onclick="openGame('math')">Play</button>
</div>

</div>

<!-- BACK BUTTON -->
<div style="text-align:center;">
<button class="back" onclick="back()">⬅ Vissza a Store-ba</button>
</div>

<!-- GUESS -->
<div id="guess" class="game">
<h2>🎯 Guess Game</h2>
<input id="guessInput" type="number">
<button onclick="guess()">Tipp</button>
<p id="guessResult"></p>
</div>

<!-- CLICK -->
<div id="click" class="game">
<h2>👆 Click Game</h2>
<p>Pont: <span id="score">0</span></p>
<button onclick="add()">Kattints!</button>
</div>

<!-- RPS -->
<div id="rps" class="game">
<h2>✊ Kő-Papír-Olló</h2>
<button onclick="rps('rock')">✊</button>
<button onclick="rps('paper')">✋</button>
<button onclick="rps('scissors')">✌️</button>
<p id="rpsResult"></p>
</div>

<!-- MATH -->
<div id="math" class="game">
<h2>➗ Math Game</h2>
<p id="mathQ"></p>
<input id="mathA" type="number">
<button onclick="checkMath()">Check</button>
<p id="mathResult"></p>
</div>

<script>

let score = 0;
let random = Math.floor(Math.random()*10)+1;

/* NAVIGATION */
function openGame(id){
    document.getElementById("store").style.display = "none";
    document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function back(){
    document.getElementById("store").style.display = "grid";
    document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
}

/* GUESS */
function guess(){
    let val = document.getElementById("guessInput").value;
    if(val == random){
        document.getElementById("guessResult").innerText = "🎉 Talált!";
        random = Math.floor(Math.random()*10)+1;
    } else {
        document.getElementById("guessResult").innerText = "❌ nem jó";
    }
}

/* CLICK */
function add(){
    score++;
    document.getElementById("score").innerText = score;
}

/* RPS */
function rps(p){
    let arr = ["rock","paper","scissors"];
    let cpu = arr[Math.floor(Math.random()*3)];

    if(p===cpu){
        document.getElementById("rpsResult").innerText="Döntetlen 🤝";
    } else if(
        (p==="rock"&&cpu==="scissors")||
        (p==="paper"&&cpu==="rock")||
        (p==="scissors"&&cpu==="paper")
    ){
        document.getElementById("rpsResult").innerText="Nyertél 🎉 CPU:"+cpu;
    } else {
        document.getElementById("rpsResult").innerText="Vesztettél 😅 CPU:"+cpu;
    }
}

/* MATH */
let a=0,b=0;

function newMath(){
    a=Math.floor(Math.random()*10);
    b=Math.floor(Math.random()*10);
    document.getElementById("mathQ").innerText = `${a} + ${b} = ?`;
}
newMath();

function checkMath(){
    let ans=document.getElementById("mathA").value;
    if(ans==a+b){
        document.getElementById("mathResult").innerText="✔️ helyes!";
    } else {
        document.getElementById("mathResult").innerText="❌ nem jó";
    }
    newMath();
}

</script>

</body>
</html>
